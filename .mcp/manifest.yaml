project:
  name: ChornPlanet
  repository: khachornchit/chornplanet
  application_type: Next.js platform
  product_role: media, commerce, civilization, Smart Food evolution, luxury showcase, analytics-assisted growth platform
  agent_workspace: .mcp

current_architecture_direction:
  content_migration_target: MongoDB Atlas backed content services
  pattern:
    - Next.js Page / Route
    - Content Loader / Server Service
    - MongoDB Atlas Repository
    - Typed Content Schema
    - Reusable Page Components

repository_understanding:
  canonical_agent_maps:
    directory: .mcp/repository
    purpose: practical codebase maps for routes, locales, styling, UX, navigation, metadata, content, server, deployment, and implementation phases
    read_before_runtime_edits: true
  important_paths:
    app_router: src/app
    localized_public_pages: src/app/[locale]/(legacy)
    api_routes: src/app/api
    locale_source: src/lib/SiteUrlLocales.ts
    proxy_locale_headers: src/proxy.ts
    sitemap_route_inventory: src/lib/sitemap/sitemapRoutes.ts
    image_registry: src/image/ImageUrl.ts
    metadata: src/metadata
    content_loaders: src/lib/*-content
    server_layers: server
    styles: src/styles
  implementation_bias:
    - prefer existing SCSS and component patterns
    - keep route, locale, metadata, sitemap, and content changes aligned
    - avoid production behavior changes in documentation-only features
    - treat .codex/Agents.md as Codex execution rules and .mcp/repository as shared repository maps

release_index:
  primary: .planning/achieved/released.md
  directory_rule: .planning/achieved contains only released.md
  purpose: compact completed-feature index with Feature, Category, and Source Path columns
  detail_rule: agents inspect listed source paths and .mcp/repository maps instead of relying on verbose achieved planning archives
  mcp_release_directory: not used

roadmap:
  directory: .mcp/roadmap
  primary: .mcp/roadmap/business-core.md
  growth_milestones: .mcp/roadmap/growth-milestones.md
  purpose: business-core platform roadmap plus simplified growth milestones and implementation queue for media, commerce, civilization, Smart Food, analytics, SEO/LLM visibility, automation, and luxury expansion

analytics_workspace:
  directory: .mcp/analytics
  purpose: on-demand aggregate analytics contracts and report shapes for planning and prioritization
  mode: documentation_contract_only
  runtime_api_status: future_feature
  approval_required_for:
    - Google Search Console API connection
    - Google Analytics API connection
    - production analytics credentials
    - internal analytics API authorization model

product_goals:
  traffic_growth:
    stages:
      - 10000_daily
      - 100000_daily
      - 500000_daily
      - 1000000_daily
  media:
    - daily news follow-up
    - daily entertainment follow-up
    - daily technology follow-up
    - AI search to digest to image/video to post workflow
  commerce:
    - premium commerce
    - grocery
    - online supermarket
    - lady/gentleman outfit
    - civilization clothing posting
    - TikTok first
    - future Shopee, Lazada, Amazon links
  civilization:
    - ChornPlanet world and zone presentation
    - outfit/clothing display through DNA workflow
    - luxury civilization storytelling
  smart_food:
    - Line OA user login evolution
    - food ordering via website
    - favorite meal and user preference experience
    - future booking and customer self-service ideas
  luxury:
    - luxury project showcase
    - premium product storytelling
  analytics:
    - Google Analytics integration
    - AI assistant for growth insight
    - SEO and LLM visibility through llm.txt and llm-full.txt
    - on-demand aggregate growth summaries for planning

local_authorities:
  dna_media_generation_workflow:
    directory: .chatgpt
    path: MediaGenerationWorkflow.md
    purpose: StoryGenProduct, AutoScene, ImagePrompt, VdoPrompt, StoryPostEngine workflow authority
  dna_version_control:
    directory: .chatgpt
    path: VersionControl.md
    purpose: latest document version tracking for engines, contracts, systems, and workflow files
  dna_zone_list:
    directory: .chatgpt
    path: system/world/Zones/Zone List.md
    rule: Zone List -> Zone File -> exactly one Sub-Zone
  dna_manual:
    directory: .dna
    path: manual
    purpose: manual examples and use cases

agents:
  khachornchit:
    role: chief architect, product owner, final approval authority
  chatgpt:
    role: product planning, architecture proposal, content strategy, AI workflow design, market strategy
    startup_files:
      - .chatgpt/Agents.md
      - .mcp/README.md
      - .mcp/manifest.yaml
      - .planning/achieved/released.md
  codex:
    role: implementation, tests, validation, PR readiness
    startup_files:
      - .codex/Agents.md
      - .mcp/README.md
      - .mcp/manifest.yaml
      - .planning/achieved/released.md
  future_mcp_server:
    role: expose safe tools/resources to AI clients for content, commerce, analytics, and repository workflows

approval_required:
  - production deployment
  - automatic external posting
  - customer message sending
  - commerce product publication
  - order or payment mutation
  - Google Analytics data write/change
  - Firebase authentication production changes
  - Line OA production login changes
  - TikTok/Shopee/Lazada/Amazon publication
  - secrets or credential changes
  - deleting branches
  - changing public API contracts
  - changing production data schemas

phase1_scope:
  - create shared agent workspace
  - document product and system context
  - define safety policies
  - define tool contracts
  - define workflows for media automation, outfit posting, commerce, Smart Food, analytics, SEO/LLM visibility
  - define repository-understanding maps for safer planning and implementation
  - do not implement automatic posting or external platform mutation yet
